AWSTemplateFormatVersion: '2010-09-09'
Description: Penguin Battle CloudFront (deploy to us-east-1)

Parameters:
  ApiGatewayDomain:
    Type: String
    Description: API Gateway WebSocket domain (e.g. xxx.execute-api.ap-northeast-1.amazonaws.com)

Resources:
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: Penguin Battle WebSocket proxy
        Origins:
          - Id: WebSocketOrigin
            DomainName: !Ref ApiGatewayDomain
            OriginPath: /prod
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: WebSocketOrigin
          ViewerProtocolPolicy: https-only
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
          Compress: false
        PriceClass: PriceClass_200
        HttpVersion: http2

Outputs:
  CloudFrontDomain:
    Description: CloudFront domain name
    Value: !GetAtt CloudFrontDistribution.DomainName
  CloudFrontWebSocketURL:
    Description: WebSocket URL via CloudFront
    Value: !Sub "wss://${CloudFrontDistribution.DomainName}"
